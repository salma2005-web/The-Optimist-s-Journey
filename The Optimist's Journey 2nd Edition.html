<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Optimist's Journey: Evolved</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .slide-up { animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .pulse-soft { animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        #app-container { transition: opacity 0.4s ease-in-out; min-height: 100vh; display: flex; align-items: center; justify-content: center; width: 100%; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen bg-slate-100 font-sans selection:bg-amber-200">

    <div id="app-container"></div>

    <script>
        const scenarios = [
            {
                id: 1, difficulty: 1, icon: 'smartphone', title: "The Missed Alarm",
                situation: "Your alarm didn't go off. You're rushing through your morning routine, and you drop your phone, shattering the screen. You are going to be late.",
                options: [
                    { text: "Force a smile and tell yourself 'everything happens for a reason!' while ignoring your racing heart.", response: "This is toxic positivity. You are trying to skip the frustration without actually processing it. True optimism isn't ignoring the mess; it's believing you have the resilience to clean it up.", type: "shadow", value: 1 },
                    { text: "Sigh, accept the cost of the screen, and send a factual text that you will be late.", response: "Functional, but a bit cold. You are surviving the moment without necessarily growing from it. An optimistic lens would remind you that a bumpy start makes a smooth finish feel even more rewarding.", type: "neutral", value: 1 },
                    { text: "Pause. Take one deep breath. Acknowledge the chaotic start, and consciously decide that a broken screen does not mandate a ruined day.", response: "Excellent. You are creating a boundary between a bad moment and a bad day. Optimism thrives in this space—knowing that the rest of the day is still yours to shape positively.", type: "optimal", value: 2 }
                ],
                silverLining: "Small chaotic moments test our baseline reactivity. Shattering a screen is a low-stakes opportunity to practice emotional compartmentalization before real crises hit. It reminds you that you control your internal weather, regardless of the external storm."
            },
            {
                id: 2, difficulty: 2, icon: 'message-square', title: "The Misguided Joke",
                situation: "At a dinner party, you make a joke that lands terribly. The room goes silent, and you've clearly offended the host.",
                options: [
                    { text: "Defensively double down, muttering that people are 'too sensitive these days.'", response: "Ego protection. You are choosing to burn a bridge rather than admit a flaw. Optimism invites you to see apologies not as weakness, but as strong bridges to deeper connections.", type: "shadow", value: 0 },
                    { text: "Quietly apologize to the person next to you and remain silent for the rest of the night.", response: "You've stopped the bleeding, but retreating into a shell lets shame win. An optimistic spirit recognizes that one awkward moment doesn't define your entire character or the whole evening.", type: "neutral", value: 1 },
                    { text: "Own it immediately. Sincerely apologize to the room without making excuses, and gracefully change the subject.", response: "Profound maturity. You diffused the tension by removing your ego from the equation. This is applied optimism: trusting that vulnerability and honesty will be met with grace.", type: "optimal", value: 2 }
                ],
                silverLining: "Public embarrassment is a rapid ego-death. Surviving it proves that your worth isn't tied to constant social perfection. An honest, undefended apology actually builds deeper respect than a flawless persona ever could."
            },
            {
                id: 3, difficulty: 3, icon: 'shield-alert', title: "The Shifted Blame",
                situation: "Your manager publicly blames you for a major error they committed. You have the emails proving your innocence, but exposing them might ruin your career there.",
                options: [
                    { text: "Swallow the blame completely to 'keep the peace', convincing yourself it's noble to be a martyr.", response: "Avoidance dressed up as virtue. Allowing yourself to be a scapegoat destroys your self-respect. True optimism requires advocating for your worth, trusting that the truth is strong enough to stand on.", type: "shadow", value: 0 },
                    { text: "Send the evidence directly to HR and start looking for a new job immediately.", response: "The nuclear option. It's just, but it ensures maximum chaos and immediate instability. A more optimistic approach looks for a path to resolution that builds bridges instead of instantly burning them.", type: "neutral", value: 1 },
                    { text: "Request a private meeting. Present the evidence calmly and negotiate a mutually beneficial way to 'correct the record'.", response: "Strategic courage. You are defending your boundaries while offering them a graceful exit. This hopeful stance believes that even difficult professional conflicts can be resolved with mutual respect.", type: "optimal", value: 2 }
                ],
                silverLining: "Injustice forces you to clarify your professional boundaries. You learn the crucial difference between being a team player and being a victim. It reveals the exact nature of the environment you are in, giving you the data needed to plan your next move."
            },
            {
                id: 4, difficulty: 4, icon: 'lock', title: "The Leaked Confidence",
                situation: "You discover your closest friend shared a deeply vulnerable secret of yours as casual gossip at a party.",
                options: [
                    { text: "Cut them off entirely without a word to protect yourself from further pain.", response: "Self-preservation, but ghosting them leaves you carrying the unresolved anger forever. Optimism dares to believe that expressing your hurt is a step toward your own emotional freedom, regardless of their reaction.", type: "shadow", value: 1 },
                    { text: "Confront them angrily, demanding a public apology and telling others what they did.", response: "Retaliation creates drama, but it doesn't actually heal the breach of trust. An optimistic pivot focuses on healing your own peace rather than punishing their mistake.", type: "neutral", value: 1 },
                    { text: "Tell them exactly how it made you feel, then consciously step back to re-evaluate their role in your life.", response: "Clarity without cruelty. You are holding them accountable while protecting your peace. This reflects a deep optimism: trusting yourself to navigate betrayal without losing your own grace.", type: "optimal", value: 2 }
                ],
                silverLining: "Betrayal violently recalibrates your inner circle. It hurts, but it acts as a necessary, heavy-duty filter, ensuring the people closest to your vault are actually equipped with the integrity to guard it."
            },
            {
                id: 5, difficulty: 5, icon: 'trending-up', title: "The Stolen Opportunity",
                situation: "A promotion you were promised goes to an external hire who is less qualified but better at networking. You are asked to train them.",
                options: [
                    { text: "Agree to train them, but subtly sabotage their onboarding so management realizes their mistake.", response: "Passive aggression poisons you faster than it hurts them. Optimism challenges you to rise above the bitterness, trusting that your integrity is your most valuable career asset.", type: "shadow", value: 0 },
                    { text: "Refuse to train them and do the bare minimum of your job until you find a new one.", response: "A fair protest, but checking out completely stalls your own momentum and skills. Optimism looks forward, reminding you that your current excellence is the best resume for your next great leap.", type: "neutral", value: 1 },
                    { text: "Train them professionally while using the anger as fuel to drastically upscale your external job hunt.", response: "Alchemy. You are converting raw frustration into forward momentum. This is the pinnacle of professional optimism: knowing that if this door closed, a better one is waiting for you to kick it open.", type: "optimal", value: 2 }
                ],
                silverLining: "Being passed over breaks the dangerous illusion of corporate loyalty. It frees you from waiting to be 'chosen' by a broken system and forces you to become the active architect of your own career trajectory."
            },
            {
                id: 6, difficulty: 6, icon: 'scale', title: "The Golden Handcuffs",
                situation: "You discover your company is knowingly deceiving its most vulnerable clients. Exposing it means losing a high-paying job you desperately need.",
                options: [
                    { text: "Rationalize it. Tell yourself 'every company does this' and use the money to justify the moral rot.", response: "Compromising your core values for comfort will quietly erode your sense of self. Optimism requires the brave belief that a clean conscience will ultimately bring you far more peace than a compromised paycheck.", type: "shadow", value: 0 },
                    { text: "Quietly resign without saying anything, leaving the problem for someone else to deal with.", response: "You protected your own hands, but the harm continues. A deeper optimism steps up, trusting that doing the right thing, even when hard, inspires others and sparks real change.", type: "neutral", value: 1 },
                    { text: "Document everything securely, secure a personal transition plan, and act as a whistleblower.", response: "Profound integrity. You are balancing your moral obligation with practical survival. This action embodies optimism: having faith that the truth, handled responsibly, leads to a better future for everyone.", type: "optimal", value: 2 }
                ],
                silverLining: "Deep moral dilemmas force you to establish your absolute bottom line. You realize that true wealth isn't the salary hitting your bank account, but the ability to sleep at night with a completely uncompromised conscience."
            },
            {
                id: 7, difficulty: 7, icon: 'activity', title: "The Sudden Diagnosis",
                situation: "A doctor informs you of a chronic, life-altering condition. You must permanently give up your favorite hobby and radically change your lifestyle.",
                options: [
                    { text: "Start a blog about how the disease is a 'gift' before you've even allowed yourself to cry.", response: "Premature optimization. You cannot find the light until you've grieved the dark. Authentic optimism allows the tears to fall first, knowing that the sun will feel warmer once the storm has truly passed.", type: "shadow", value: 1 },
                    { text: "Fall into deep bitterness, defining your entire identity around the illness and what was taken.", response: "Understandable, but defining yourself by your limitations guarantees a smaller life. Optimism gently nudges you to look at the vast horizon of things you can still experience, rather than staring only at the closed door.", type: "neutral", value: 1 },
                    { text: "Fiercely grieve your old life, then slowly begin the process of discovering what your new body can still do.", response: "Radical acceptance. You are honoring the loss while refusing to stop living. This is the highest form of optimism: believing that a beautiful, meaningful life is still entirely possible in a new form.", type: "optimal", value: 2 }
                ],
                silverLining: "Illness forcefully strips away the illusion of control. It demands profound presence, teaching you that joy must be extracted from the reality of today, not the memories of yesterday. It forces you to love yourself conditionally."
            },
            {
                id: 8, difficulty: 8, icon: 'alert-triangle', title: "The Costly Oversight",
                situation: "A moment of negligence on your part causes a significant financial and emotional loss for someone you love. They forgive you, but the damage is permanent.",
                options: [
                    { text: "Punish yourself constantly, rejecting their forgiveness because you believe you deserve to suffer.", response: "Self-flagellation is actually selfish; it makes their loss about your guilt. Optimism invites you to forgive yourself, trusting that your future actions are the true measure of your character.", type: "shadow", value: 0 },
                    { text: "Pay them back financially but become emotionally distant because the guilt is too hard to face.", response: "You fixed the math, but you broke the connection to protect your ego. An optimistic heart believes that relationships can survive mistakes, provided you are brave enough to stay emotionally present.", type: "neutral", value: 1 },
                    { text: "Accept their forgiveness, forgive yourself, and commit to a lifetime of radical responsibility.", response: "True redemption. You are using the weight of the mistake to forge a better version of yourself. This is radical optimism: transforming your deepest regrets into the fuel for your greatest growth.", type: "optimal", value: 2 }
                ],
                silverLining: "Guilt is a heavy anchor, but true remorse is a compass. Making an irreversible mistake shatters your ego and rebuilds it on a foundation of deep, earned humility and grace. It teaches you the staggering weight of your actions."
            },
            {
                id: 9, difficulty: 9, icon: 'mountain-snow', title: "The Hollow Victory",
                situation: "You finally achieve the singular life goal you've chased for a decade. The next morning, instead of lasting joy, you feel entirely empty and purposeless.",
                options: [
                    { text: "Immediately set a new, harder goal to chase that high, ignoring the emptiness entirely.", response: "The treadmill approach. You are running from the void rather than facing it. Optimism asks you to slow down and find joy in the present moment, trusting that you are already enough without another trophy.", type: "shadow", value: 1 },
                    { text: "Become cynical, telling everyone that ambition is a scam and nothing actually matters.", response: "Nihilism is a defense mechanism against disappointment. Optimism challenges you to see that just because the goal didn't bring lasting joy, it doesn't mean joy doesn't exist—it's just found in the journey.", type: "neutral", value: 1 },
                    { text: "Sit in the void. Acknowledge that meaning is not found in trophies, but in the texture of daily existence.", response: "Awakening. You are breaking the spell of external validation. This realization breeds true optimism: the comforting knowledge that peace is available right now, in the simple beauty of everyday life.", type: "optimal", value: 2 }
                ],
                silverLining: "The 'arrival fallacy' is a painful but necessary awakening. Achieving your dreams and feeling empty proves that your soul requires deeper nourishment than external milestones. You are finally free to live for the process, not the prize."
            },
            {
                id: 10, difficulty: 10, icon: 'hourglass', title: "The Inevitable Goodbye",
                situation: "You are sitting by the side of someone you deeply love as they succumb to a terminal illness. There is nothing left to fix, plan, or solve.",
                options: [
                    { text: "Frantically search for alternative cures online to avoid the heavy reality in the room.", response: "Denial steals the final, precious moments you have left with them. Optimism here isn't hoping for a miracle; it's finding the profound beauty and privilege in simply being present for their final chapter.", type: "shadow", value: 1 },
                    { text: "Dissociate completely. Handle all the medical paperwork so you don't have to feel the grief.", response: "Functional numbness. You are managing the logistics, but missing the goodbye. A courageous optimism leans into the pain, trusting that your heart is vast enough to hold this immense grief without breaking.", type: "neutral", value: 1 },
                    { text: "Hold their hand in total silence. Lean entirely into the devastating pain of the present moment.", response: "Absolute courage. You are offering the greatest gift humanly possible: bearing witness. This is the ultimate, quiet optimism: knowing that love doesn't end with goodbye, and the connection you share will endure forever.", type: "optimal", value: 2 }
                ],
                silverLining: "Death is the ultimate, unavoidable reality. By surrendering the frantic need to 'fix' it, you unlock the purest form of love. The depth of your grief is simply the unspent love you hold for them—a beautiful, painful testament to a connection that transcends time."
            }
        ];

        let state = {
            view: 'start',
            currentStep: 0,
            phase: 'choice',
            optimism: 10,
            momentum: 1,
            history: [],
            counts: { shadow: 0, neutral: 0, optimal: 0 }
        };

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

        function render() {
            const container = document.getElementById('app-container');
            let html = '';

            if (state.view === 'start') {
                html = `
                    <div class="max-w-xl text-center space-y-8 p-6 fade-in">
                        <div class="inline-block p-4 bg-amber-100 rounded-full mb-4 shadow-lg border border-amber-200">
                            <i data-lucide="sun" class="w-16 h-16 text-amber-500 pulse-soft"></i>
                        </div>
                        <h1 class="text-5xl font-black text-slate-800 tracking-tight">The Optimist's Journey</h1>
                        <p class="text-xl text-slate-600 leading-relaxed">Every shadow is simply proof that light is shining nearby. Embrace 10 challenging realities and discover the extraordinary resilience of your own perspective.</p>
                        <button onclick="actions.start()" class="bg-gradient-to-r from-amber-400 to-orange-500 text-white px-10 py-4 rounded-full font-bold hover:from-amber-500 hover:to-orange-600 transition-all shadow-xl transform hover:-translate-y-1 flex items-center gap-2 mx-auto">
                            Step Into the Light <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                `;
            } else if (state.view === 'playing') {
                const scenario = scenarios[state.currentStep];
                const options = scenario.shuffledOptions || (scenario.shuffledOptions = shuffle([...scenario.options]));

                html = `
                    <div class="max-w-3xl w-full p-4 fade-in">
                        <div class="flex justify-between items-center mb-6">
                            <div class="flex gap-1.5 sm:gap-2">
                                ${scenarios.map((_, i) => `<div class="h-1 w-5 sm:w-8 rounded ${i <= state.currentStep ? 'bg-amber-400' : 'bg-slate-300'}"></div>`).join('')}
                            </div>
                            <div class="text-xs font-mono font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                <span class="text-rose-500">Level ${scenario.difficulty}</span> 
                                <span class="text-slate-300">|</span> 
                                <span>Momentum: x${state.momentum.toFixed(1)}</span>
                            </div>
                        </div>
                `;

                if (state.phase === 'choice') {
                    html += `
                        <div class="glass border border-white rounded-3xl p-6 sm:p-8 shadow-2xl space-y-6">
                            <div class="flex items-center gap-4">
                                <span class="p-3 bg-slate-800 text-white rounded-2xl"><i data-lucide="${scenario.icon}"></i></span>
                                <h2 class="text-2xl font-bold text-slate-800">${scenario.title}</h2>
                            </div>
                            <p class="text-xl sm:text-2xl text-slate-700 font-serif leading-snug">${scenario.situation}</p>
                            <div class="grid gap-3 pt-4">
                                ${options.map((opt, i) => `
                                    <button onclick="actions.choose(${i})" class="group flex items-center text-left p-4 sm:p-5 rounded-2xl border-2 border-slate-100 hover:border-amber-400 hover:bg-amber-50 transition-all">
                                        <span class="w-8 h-8 sm:w-10 sm:h-10 rounded-full border border-slate-200 flex items-center justify-center mr-4 group-hover:bg-amber-400 group-hover:text-white transition-all text-slate-300 shrink-0">?</span>
                                        <span class="text-md sm:text-lg text-slate-600 font-medium">${opt.text}</span>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    const opt = state.lastChoice;
                    html += `
                        <div class="space-y-6 slide-up">
                            <div class="bg-slate-800 text-white rounded-3xl p-8 shadow-xl">
                                <h3 class="text-amber-400 font-bold uppercase tracking-widest text-[10px] mb-2">Reaction Analysis</h3>
                                <p class="text-xl italic text-slate-300 mb-4">"${opt.text}"</p>
                                <p class="text-lg text-slate-100">${opt.response}</p>
                            </div>
                            <div class="bg-white border-2 border-amber-100 rounded-3xl p-8 shadow-inner relative overflow-hidden">
                                <div class="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="sun" class="w-32 h-32"></i></div>
                                <h3 class="text-amber-600 font-bold uppercase tracking-widest text-[10px] mb-4 flex items-center gap-2">
                                    <i data-lucide="sparkles" class="w-4 h-4"></i> The Silver Lining
                                </h3>
                                <p class="text-xl sm:text-2xl text-slate-800 font-serif leading-relaxed">${scenario.silverLining}</p>
                            </div>
                            <button onclick="actions.next()" class="w-full py-5 bg-amber-400 text-amber-900 font-black rounded-2xl hover:bg-amber-500 transition-all shadow-lg text-xl uppercase tracking-tighter flex items-center justify-center gap-2">
                                Next Reality <i data-lucide="arrow-right" class="w-6 h-6"></i>
                            </button>
                        </div>
                    `;
                }
                html += `</div>`;
            } else if (state.view === 'end') {
                const results = actions.calculateArchetype();
                html = `
                    <div class="max-w-3xl w-full p-6 fade-in space-y-8">
                        <div class="text-center space-y-4">
                            <div class="inline-block p-6 bg-slate-800 rounded-full text-white shadow-2xl mb-4">
                                <i data-lucide="${results.icon}" class="w-16 h-16"></i>
                            </div>
                            <h1 class="text-5xl font-black text-slate-800">Your Archetype:</h1>
                            <p class="text-4xl text-amber-600 font-black italic underline">${results.archetype}</p>
                        </div>

                        <div class="grid md:grid-cols-2 gap-6">
                            <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 space-y-4">
                                <h3 class="text-slate-800 font-bold text-xl flex items-center gap-2">
                                    <i data-lucide="search" class="w-5 h-5 text-amber-500"></i> The Analysis
                                </h3>
                                <p class="text-slate-600 leading-relaxed">${results.analysis}</p>
                            </div>
                            <div class="bg-amber-50 p-8 rounded-3xl shadow-xl border border-amber-100 space-y-4">
                                <h3 class="text-amber-900 font-bold text-xl flex items-center gap-2">
                                    <i data-lucide="lightbulb" class="w-5 h-5 text-amber-600"></i> Recommendations
                                </h3>
                                <p class="text-amber-800 leading-relaxed">${results.recommendation}</p>
                            </div>
                        </div>

                        <div class="bg-slate-800 text-white p-8 rounded-3xl shadow-2xl">
                             <h3 class="text-amber-400 font-bold uppercase tracking-widest text-xs mb-6">Journey Momentum Summary</h3>
                             <div class="flex items-end gap-1 h-32">
                                ${state.history.map((h, i) => `
                                    <div class="flex-1 bg-amber-400 rounded-t-lg transition-all" style="height: ${h.momentum * 40}px; opacity: ${0.3 + (i/10)}"></div>
                                `).join('')}
                             </div>
                             <div class="flex justify-between mt-2 text-[10px] text-slate-400 uppercase font-bold">
                                <span>Start</span>
                                <span>End</span>
                             </div>
                        </div>

                        <div class="flex justify-center pt-4">
                            <button onclick="actions.restart()" class="bg-slate-200 text-slate-800 px-10 py-4 rounded-full font-bold hover:bg-slate-300 transition-all flex items-center gap-2">
                                <i data-lucide="rotate-ccw" class="w-5 h-5"></i> Retrace the Path
                            </button>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
            lucide.createIcons();
        }

        const actions = {
            start: () => {
                // Sort scenarios progressively by difficulty instead of random shuffling
                scenarios.sort((a, b) => a.difficulty - b.difficulty);
                scenarios.forEach(s => s.shuffledOptions = null);
                state.view = 'playing';
                state.currentStep = 0;
                state.phase = 'choice';
                state.optimism = 10;
                state.momentum = 1;
                state.history = [];
                state.counts = { shadow: 0, neutral: 0, optimal: 0 };
                render();
            },
            choose: (idx) => {
                const scenario = scenarios[state.currentStep];
                const choice = scenario.shuffledOptions[idx];
                state.lastChoice = choice;
                state.phase = 'outcome';
                
                state.counts[choice.type]++;
                
                if (choice.type === 'optimal') state.momentum += 0.2;
                if (choice.type === 'shadow') state.momentum = Math.max(0.4, state.momentum - 0.2);
                if (choice.type === 'neutral') state.momentum = Math.max(0.7, state.momentum - 0.05);
                
                state.history.push({ step: state.currentStep, momentum: state.momentum, type: choice.type });
                state.optimism += (choice.value * state.momentum);
                render();
            },
            next: () => {
                if (state.currentStep < scenarios.length - 1) {
                    state.currentStep++;
                    state.phase = 'choice';
                } else {
                    state.view = 'end';
                }
                render();
            },
            calculateArchetype: () => {
                const { shadow, neutral, optimal } = state.counts;
                if (optimal >= 7) {
                    return {
                        archetype: "The Luminous Sage",
                        icon: "sun",
                        analysis: "You possess a rare 'True North' in your decision making. You don't just find silver linings; you weave them out of the thread of reality.",
                        recommendation: "Your strength is authenticity. Continue to trust your intuition even when others rush to panic. Share your perspective—people need your calm."
                    };
                } else if (shadow >= 5) {
                    return {
                        archetype: "The Shadow Voyager",
                        icon: "moon",
                        analysis: "Your reactions tend toward avoidance or 'Toxic Positivity'—trying to skip the pain to get to the lesson.",
                        recommendation: "Allow yourself to be 'unproductive' during a crisis. Optimism isn't the absence of pain; it's the acceptance of it."
                    };
                } else if (neutral >= 5) {
                    return {
                        archetype: "The Stoic Realist",
                        icon: "anchor",
                        analysis: "You have a balanced, grounded approach. You don't get swept away by high emotion, but you sometimes play it a bit too safe.",
                        recommendation: "Try to lean into the 'absurdity' of a situation more. Humor and radical rest are just as productive as fixing the car."
                    };
                } else {
                    return {
                        archetype: "The Adaptive Seeker",
                        icon: "wind",
                        analysis: "Your journey was varied and inconsistent—much like life itself.",
                        recommendation: "Reflect on which scenarios triggered your 'Shadow' responses. Focus on your resilience in those specific sectors."
                    };
                }
            },
            restart: () => {
                state.view = 'start';
                render();
            }
        };

        render();
    </script>
</body>
</html>
